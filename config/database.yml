development:
  url: <%= ENV['DATABASE_URL'] || 'postgresql://localhost:5432/levelfly' %>
  encoding: UTF8
  host: localhost
  pool: 5

#  WARNING: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  url: <%= ENV['DATABASE_URL_TEST'] %>
  encoding: UTF8
  pool: 5
  timeout: 5000

# NOTE: We avoid using DATABASE_URL here, because ActiveRecord does not
# support underscores in database hostnames when using DATABASE_URL:
# https://stackoverflow.com/a/64344976/14269772
production:
  host: <%= ENV['DATABASE_HOST'] %>
  username: <%= ENV['DATABASE_USERNAME'] %>
  password: <%= ENV['DATABASE_PASSWORD'] %>
  adapter: postgresql
  database: levelfly
  encoding: utf8
  pool: 5
  timeout: 5000
